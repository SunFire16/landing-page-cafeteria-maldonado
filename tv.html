<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a0e07" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Menú del día · Cafetería Maldonado (TV)</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/tv.css" />
</head>
<body class="tv">
  <div class="tv-shell" data-tv-shell>
    <header class="tv-header">
      <div class="tv-header__brand">
        <img src="/assets/logo.png" alt="Cafetería Maldonado" />
        <div>
          <p class="tv-eyebrow">Cafetería Maldonado</p>
          <h1 class="tv-header__title">Menú del día</h1>
        </div>
      </div>
      <div class="tv-header__loc">
        <strong>Ambas sucursales</strong>
      </div>
      <div class="tv-header__time" data-tv-time aria-label="Hora actual">--:--</div>
    </header>

    <main class="tv-main">
      <div data-tv-menu class="tv-grid"></div>
    </main>

    <footer class="tv-footer">
      <div class="tv-footer__qr">
        <span>📲 Pide desde tu celular: <strong>app-cafeteria-maldonado.web.app</strong></span>
      </div>
      <div>🤖 Disponible también en Play Store</div>
    </footer>
  </div>

  <div class="tv-controls" aria-label="Controles del modo TV">
    <button class="btn btn--ghost" type="button" data-tv-fullscreen>⛶ Pantalla completa</button>
    <button class="btn btn--ghost" type="button" data-tv-export-img>🖼 Imagen</button>
    <button class="btn btn--ghost" type="button" data-tv-export-pdf>📄 PDF</button>
    <a class="btn btn--ghost" href="/">↩ Volver</a>
  </div>

  <script type="module" src="/scripts/tv.js"></script>
</body>
</html>
