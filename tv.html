<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a0e07" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Menú del día · Cafetería Maldonado (TV)</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css?v=20260505-tv-dense19" />
  <link rel="stylesheet" href="styles/tv.css?v=20260505-tv-dense19" />
</head>
<body class="tv">
  <div class="tv-shell" data-tv-shell>
    <header class="tv-header">
      <div class="tv-header__brand">
        <img src="assets/logo.png" alt="Cafetería Maldonado" />
        <div>
          <p class="tv-eyebrow">Cafetería Maldonado</p>
          <h1 class="tv-header__title">Menú del día</h1>
        </div>
      </div>
      <div class="tv-header__center">
        <span class="tv-header__pill">📍 Local 1 · Afuera</span>
        <span class="tv-header__pill">📍 Local 2 · Adentro</span>
        <span class="tv-header__time" data-tv-time aria-label="Hora actual">--:--</span>
      </div>
      <div class="tv-header__qr">
        <img src="Codigo_QR_Personalizado.png" alt="Escanea para pedir desde tu celular" />
        <div class="tv-header__qr-text">
          <span class="tv-header__qr-eyebrow">Escanea y pide</span>
          <strong>desde tu celular</strong>
        </div>
      </div>
    </header>

    <main class="tv-main">
      <div data-tv-menu class="tv-grid"></div>
    </main>
  </div>

  <div class="tv-dock" data-tv-dock aria-label="Controles del modo TV">
    <button class="tv-dock__toggle" type="button" data-tv-dock-toggle aria-label="Mostrar controles" aria-expanded="false">⚙</button>
    <div class="tv-dock__menu" data-tv-dock-menu hidden>
      <button class="tv-dock__btn" type="button" data-tv-fullscreen title="Pantalla completa">⛶</button>
      <button class="tv-dock__btn" type="button" data-tv-export-img title="Exportar imagen">🖼</button>
      <button class="tv-dock__btn" type="button" data-tv-export-pdf title="Exportar PDF">📄</button>
      <a class="tv-dock__btn" href="./" title="Volver a la landing">↩</a>
    </div>
  </div>

  <script type="module" src="scripts/tv.js?v=20260505-tv-dense19"></script>
</body>
</html>
